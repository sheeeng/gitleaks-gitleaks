version: 2

project_name: gitleaks

builds:
  - main: main.go
    binary: gitleaks
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - "386"
      - arm
      - arm64
    goarm:
      - "6"
      - "7"
    ignore:
      - goos: windows
        goarch: arm
    tags:
      - gore2regex
    ldflags:
      - -s -w -X=github.com/zricethezav/gitleaks/v8/version.Version={{.Version}}
archives:
  - ids: [gitleaks]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x64
      {{- else if eq .Arch "386" }}x32
      {{- else }}{{ .Arch }}{{ end }}
      {{- with .Arm }}v{{ . }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]
release:
  prerelease: true

